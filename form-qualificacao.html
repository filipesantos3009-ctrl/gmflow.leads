<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antes de nos encontrarmos — GM Flow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --brand: #79b6f7;
      --deep: #2f7fe0;
      --purple: #8b5cf6;
      --teal: #34d399;
      --grad: linear-gradient(90deg, #8b5cf6, #79b6f7, #34d399);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(to right, rgba(10,10,10,.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(10,10,10,.05) 1px, transparent 1px);
      background-size: 130px 119px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      position: relative;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -50; pointer-events: none;
      background:
        radial-gradient(60rem 40rem at 85% 0%, rgba(121,182,247,.14), transparent 60%),
        radial-gradient(50rem 35rem at 0% 20%, rgba(47,127,224,.08), transparent 60%),
        radial-gradient(70rem 50rem at 50% 95%, rgba(121,182,247,.10), transparent 60%);
    }

    /* Grid lights */
    .grid-light { position:absolute;opacity:0;width:2px;height:2px;background:#fff;border-radius:50%;pointer-events:none;z-index:-20;box-shadow:0 0 3px 1px rgba(255,255,255,.7),0 0 10px 3px rgba(47,127,224,.35),0 0 22px 7px rgba(47,127,224,.12); }
    .grid-light::after{content:"";position:absolute;z-index:-20;}
    .grid-light.horizontal::after{top:0;right:100%;width:0;height:3px;background:linear-gradient(to left,rgba(47,127,224,.45),transparent);animation:trail-h var(--duration) ease-in-out forwards;}
    .grid-light.horizontal.reverse::after{right:auto;left:100%;background:linear-gradient(to right,rgba(47,127,224,.45),transparent);}
    .grid-light.vertical::after{left:0;bottom:100%;width:3px;height:0;background:linear-gradient(to top,rgba(47,127,224,.45),transparent);animation:trail-v var(--duration) ease-in-out forwards;}
    .grid-light.vertical.reverse::after{bottom:auto;top:100%;background:linear-gradient(to bottom,rgba(47,127,224,.45),transparent);}
    @keyframes trail-h{0%{width:0}25%{width:80px}45%{width:80px}100%{width:0}}
    @keyframes trail-v{0%{height:0}25%{height:80px}45%{height:80px}100%{height:0}}

    /* Card */
    .card {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(121,182,247,.2);
      border-radius: 20px;
      width: 100%; max-width: 720px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(139,92,246,.08), 0 2px 12px rgba(0,0,0,.06);
      position: relative; z-index: 1;
    }

    .top-bar { height: 3px; background: var(--grad); }

    .card-header {
      padding: 1.25rem 2rem 1rem;
      position: relative;
      border-bottom: 1px solid rgba(121,182,247,.15);
    }

    .mono-corner { position: absolute; opacity: .15; }
    .mono-corner.tr { top: 10px; right: 14px; }

    .logo-wrap { margin-bottom: .5rem; }
    .logo-wrap img { height: 40px; width: auto; }

    h1 { font-size: 1.35rem; font-weight: 700; color: #0f172a; margin-bottom: .15rem; }
    .subtitle { font-size: .9rem; color: #64748b; }

    /* Body */
    .card-body { padding: 1.1rem 2rem 1.5rem; }

    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
    .field { display: flex; flex-direction: column; gap: .25rem; }
    .field.full { margin-bottom: .6rem; }

    label { font-size: .68rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }

    input, textarea {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #0f172a;
      font-size: .9rem;
      padding: .6rem .85rem;
      width: 100%; outline: none;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    input::placeholder, textarea::placeholder { color: #94a3b8; }
    input:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(121,182,247,.2);
    }
    input.invalid { border-color: #f87171; box-shadow: 0 0 0 3px rgba(248,113,113,.15); }
    textarea { resize: none; height: 64px; }

    /* Orçamento pills */
    .orcamento-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
      margin-bottom: .75rem;
    }

    .orc-pill {
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: .5rem .4rem;
      text-align: center;
      font-size: .78rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all .15s;
      background: #fff;
      user-select: none;
    }

    .orc-pill:hover { border-color: var(--brand); color: var(--deep); }

    .orc-pill.selected {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 8px rgba(121,182,247,.35);
    }

    /* Botão */
    .btn {
      width: 100%; padding: .8rem;
      background: var(--grad);
      color: #fff; font-weight: 700; font-size: 1rem;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: .3rem;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.99); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Erro */
    .error-msg {
      display: none;
      background: #fef2f2; border: 1px solid #fca5a5;
      color: #dc2626; border-radius: 8px;
      padding: .6rem .85rem; font-size: .78rem; margin-top: .5rem;
    }

    /* Sucesso */
    .success {
      display: none; text-align: center; padding: 2.5rem 1rem;
    }
    .success .icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .success h2 { font-size: 1.3rem; color: #0f172a; margin-bottom: .4rem; }
    .success p { color: #64748b; font-size: .9rem; }

    @media (max-width: 600px) {
      .g2 { grid-template-columns: 1fr; }
      .orcamento-grid { grid-template-columns: repeat(2, 1fr); }
      .card-header, .card-body { padding-left: 1.25rem; padding-right: 1.25rem; } h1 { font-size: 1.1rem; } .orc-pill { font-size: .72rem; padding: .45rem .3rem; }
    }
  </style>
</head>

    <h1>Antes de nos encontrarmos…</h1>
    <p class="subtitle">Leva 2 minutos. Ajuda-nos a preparar uma conversa mais útil para ti.</p>
  </div>

  <div class="card-body">
    <div id="form-section">
      <form id="lead-form" novalidate>

        <div class="g2">
          <div class="field">
            <label for="company-name">Company Name *</label>
            <input type="text" id="company-name" placeholder="Nome da empresa" required />
          </div>
          <div class="field">
            <label for="company-website">Company Website</label>
            <input type="url" id="company-website" placeholder="https://empresa.pt" />
          </div>
        </div>

        <div class="g2">
          <div class="field">
            <label for="decision-maker">Decision Maker Name *</label>
            <input type="text" id="decision-maker" placeholder="Nome completo" required />
          </div>
          <div class="field">
            <label for="position">Position *</label>
            <input type="text" id="position" placeholder="Ex: CEO, Diretor..." required />
          </div>
        </div>

        <div class="g2">
          <div class="field">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" placeholder="+351 9xx xxx xxx" required
              inputmode="tel" pattern="[\d\s\+\-\(\)]+" />
          </div>
          <div class="field">
            <label for="email">Email *</label>
            <input type="email" id="email" placeholder="nome@empresa.pt" required
              autocomplete="email" />
          </div>
        </div>

        <div class="g2" style="margin-bottom:.6rem">
          <div class="field">
            <label for="business-area">Business Area *</label>
            <input type="text" id="business-area" placeholder="Ex: Tecnologia, Retalho..." required />
          </div>
          <div class="field">
            <label for="motivo">Motivo da reunião *</label>
            <textarea id="motivo" placeholder="O que pretendes discutir?" required></textarea>
          </div>
        </div>

        <label style="font-size:.68rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.35rem">Orçamento disponível</label>
        <div class="orcamento-grid" id="orc-grid">
          <div class="orc-pill" data-value="Menos de 1.000€">Menos de 1.000€</div>
          <div class="orc-pill" data-value="1.000€ – 5.000€">1.000 – 5.000€</div>
          <div class="orc-pill" data-value="5.000€ – 15.000€">5.000 – 15.000€</div>
          <div class="orc-pill" data-value="15.000€ – 50.000€">15.000 – 50.000€</div>
          <div class="orc-pill" data-value="Mais de 50.000€">Mais de 50.000€</div>
          <div class="orc-pill" data-value="Ainda não definido">Não definido</div>
        </div>
        <input type="hidden" id="orcamento" />

        <button type="submit" class="btn" id="submit-btn">Confirmar presença →</button>
        <div class="error-msg" id="error-msg"></div>

      </form>
    </div>

    <div class="success" id="success-section">
      <div class="icon">✅</div>
      <h2>Tudo confirmado!</h2>
      <p>Recebemos as tuas respostas.<br />A reunião mantém-se no horário marcado.</p>
    </div>
  </div>
</div>

<script>
  const AIRTABLE_API_KEY = 'patQd64RxlNWzgrk8.f985ee1002071cbb1ec00b87a4dd1fae0921ad37bbbf6a7a948b7503f6b1e554';
  const AIRTABLE_BASE_ID = 'app8jKzf1mSn3mv8l';
  const AIRTABLE_TABLE   = 'tblMolRddeoeJyr2d';

  // Orçamento pills
  document.querySelectorAll('.orc-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.orc-pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      document.getElementById('orcamento').value = pill.dataset.value;
    });
  });

  // Phone — só dígitos, +, espaços, parênteses, hífens
  document.getElementById('phone').addEventListener('input', function() {
    this.value = this.value.replace(/[^\d\s\+\-\(\)]/g, '');
  });

  // Validação email em tempo real
  document.getElementById('email').addEventListener('blur', function() {
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
    this.classList.toggle('invalid', this.value && !ok);
  });

  // Submit
  document.getElementById('lead-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    const fields = {
      'Company Name':            document.getElementById('company-name').value.trim(),
      'Company Website':         document.getElementById('company-website').value.trim(),
      'Decision Maker Name':     document.getElementById('decision-maker').value.trim(),
      'Decision Maker Position': document.getElementById('position').value.trim(),
      'Phone Number':            document.getElementById('phone').value.trim(),
      'Email':                   document.getElementById('email').value.trim(),
      'Business Area':           document.getElementById('business-area').value.trim(),
      'Motivo da reunião':       document.getElementById('motivo').value.trim(),
      'Orçamento disponível':    document.getElementById('orcamento').value,
      'Lead Date':               new Date().toISOString().slice(0, 10),
    };

    const required = ['Company Name','Decision Maker Name','Decision Maker Position','Phone Number','Email','Business Area','Motivo da reunião'];
    for (const f of required) {
      if (!fields[f]) {
        errEl.textContent = 'Por favor preenche todos os campos obrigatórios (*)';
        errEl.style.display = 'block'; return;
      }
    }

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields['Email']);
    if (!emailOk) {
      errEl.textContent = 'Introduz um email válido.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = 'A enviar…';

    try {
      const res = await fetch(
        `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}`,
        {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${AIRTABLE_API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields }),
        }
      );
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || res.status);
      }
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
    } catch (err) {
      console.error(err);
      errEl.textContent = `Erro: ${err.message}. Verifica as credenciais do Airtable.`;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Confirmar presença →';
    }
  });

  // Grid lights
  document.addEventListener("DOMContentLoaded", () => {
    const gridW = 130, gridH = 119;
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    function spawnLight() {
      const light = document.createElement("div");
      light.classList.add("grid-light");
      document.body.appendChild(light);
      const startX = Math.floor(Math.random() * Math.ceil(window.innerWidth / gridW)) * gridW - 1;
      const startY = Math.floor(Math.random() * Math.ceil(document.body.scrollHeight / gridH)) * gridH - 1;
      light.style.left = `${startX}px`; light.style.top = `${startY}px`;
      const isH = Math.random() > .5, dist = Math.floor(Math.random() * 3) + 1, dir = Math.random() > .5 ? 1 : -1;
      light.classList.add(isH ? "horizontal" : "vertical");
      if (dir < 0) light.classList.add("reverse");
      const endX = isH ? startX + dist * gridW * dir : startX;
      const endY = isH ? startY : startY + dist * gridH * dir;
      const duration = 500 + dist * 500;
      light.style.setProperty("--duration", `${duration}ms`);
      const anim = light.animate([
        { opacity: 0, transform: "translate(0,0)" },
        { opacity: 1, offset: .08 }, { opacity: 1, offset: .98 },
        { opacity: 0, transform: `translate(${endX-startX}px,${endY-startY}px)` }
      ], { duration, easing: "ease-in-out", fill: "forwards" });
      anim.onfinish = () => light.remove();
    }
    setInterval(spawnLight, 150); setInterval(spawnLight, 400);
  });
</script>
</body>
</html>
